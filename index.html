<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>THE Grid</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.ico"/>
<link rel="shortcut icon" href="assets/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>

</head>
<body>

<div class="layout">
  <!-- TIMETABLE -->
  <div class="timetable-shell" id="timetableShell">
    <div class="timetable-wrap" id="timetableWrap">
      <div class="timetable-scale" id="timetableScale">
        <div class="timetable" id="timetable">
        <!-- headers -->
        <div class="day-header">TIME</div>
        <div class="day-header" lang="en">MON</div>
        <div class="day-header" lang="en">TUE</div>
        <div class="day-header" lang="en">WED</div>
        <div class="day-header" lang="en">THU</div>
        <div class="day-header" lang="en">FRI</div>
        <!-- rows injected by JS -->
        </div>
      </div>
    </div>
  </div>

  <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" aria-label="시간표 너비 조절"></div>

  <!-- SIDE PANEL -->
  <aside class="side-panel">
    <div class="panel-header">
      <div class="panel-title">Add Course</div>
      <button class="panel-close" id="panelClose" type="button" aria-label="닫기">
        <svg viewBox="0 0 12 12" aria-hidden="true"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
      </button>
    </div>

    <div class="panel-body">
      <div class="panel-meta">
        <div>
          <div class="panel-meta-label">User</div>
          <div class="panel-meta-value" id="panelUser">-</div>
        </div>
        <button class="btn-ghost" id="logoutBtn" type="button">LOG OUT</button>
      </div>

      <div class="panel-divider"></div>

      <div class="field-group">
        <label class="field-label">Semester</label>
        <div class="custom-select" data-placeholder="Select semester">
          <select class="native-select" id="semesterSelect"></select>
          <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
          <div class="custom-select-menu" role="listbox"></div>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Timetable</label>
        <div class="custom-select" data-placeholder="Select timetable">
          <select class="native-select" id="timetableSelect"></select>
          <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
          <div class="custom-select-menu" role="listbox"></div>
        </div>
      </div>

      <div class="panel-actions">
        <button class="btn-secondary" id="newTable" type="button">NEW</button>
        <button class="btn-secondary" id="copyTable" type="button">COPY</button>
        <button class="btn-secondary" id="renameTable" type="button">RENAME</button>
      </div>
      <div class="panel-divider"></div>

      <div class="field-group">
        <label class="field-label">Name</label>
        <input class="field-input" id="f-name" type="text"/>
      </div>
      <div class="field-group">
        <label class="field-label">Professor</label>
        <input class="field-input" id="f-prof" type="text"/>
      </div>
      <div class="field-group">
        <label class="field-label">Room</label>
        <input class="field-input" id="f-room" type="text"/>
      </div>

      <div class="field-group">
        <label class="field-label">Credit</label>
        <input class="field-input" id="f-credit" type="number" min="1" max="6" style="text-align:center"/>
      </div>

      <div class="field-group">
        <label class="field-label">Schedule</label>
        <div class="slot-list" id="slotList">
          <div class="slot-editor">
            <div class="slot-inputs">
              <div class="custom-select" data-placeholder="Select day">
                <select class="native-select" id="f-day">
                  <option value="" selected disabled>Select day</option>
                  <option value="1">Monday</option>
                  <option value="2">Tuesday</option>
                  <option value="3">Wednesday</option>
                  <option value="4">Thursday</option>
                  <option value="5">Friday</option>
                </select>
                <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                <div class="custom-select-menu" role="listbox"></div>
              </div>
              <div class="slot-time-inputs">
                <div class="custom-select" data-placeholder="--:--">
                  <input class="native-time" id="f-start" type="time"/>
                  <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                  <div class="custom-select-menu" role="listbox"></div>
                </div>
                <span class="slot-time-sep">–</span>
                <div class="custom-select" data-placeholder="--:--">
                  <input class="native-time" id="f-end" type="time"/>
                  <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                  <div class="custom-select-menu" role="listbox"></div>
                </div>
              </div>
            </div>
            <button class="slot-add-btn" id="addSlotBtn" type="button" aria-label="Add time">+</button>
          </div>
          <div class="slot-items" id="slotItems"></div>
        </div>
        <div class="slot-actions">
          <button class="btn-ghost" id="clearSlotsBtn" type="button">CLEAR</button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Color</label>
        <div class="color-swatches" id="swatches">
          <div class="swatch sw-navy  selected" data-color="c-navy"  onclick="pickColor(this)"></div>
          <div class="swatch sw-moss"           data-color="c-moss"  onclick="pickColor(this)"></div>
          <div class="swatch sw-wine"           data-color="c-wine"  onclick="pickColor(this)"></div>
          <div class="swatch sw-slate"          data-color="c-slate" onclick="pickColor(this)"></div>
          <div class="swatch sw-umber"          data-color="c-umber" onclick="pickColor(this)"></div>
          <div class="swatch sw-teal"           data-color="c-teal"  onclick="pickColor(this)"></div>
          <div class="swatch sw-flex-red"       data-color="c-flex-red"     onclick="pickColor(this)" title="Flexoki Red"></div>
          <div class="swatch sw-flex-orange"    data-color="c-flex-orange"  onclick="pickColor(this)" title="Flexoki Orange"></div>
          <div class="swatch sw-flex-yellow"    data-color="c-flex-yellow"  onclick="pickColor(this)" title="Flexoki Yellow"></div>
          <div class="swatch sw-flex-green"     data-color="c-flex-green"   onclick="pickColor(this)" title="Flexoki Green"></div>
          <div class="swatch sw-flex-cyan"      data-color="c-flex-cyan"    onclick="pickColor(this)" title="Flexoki Cyan"></div>
          <div class="swatch sw-flex-blue"      data-color="c-flex-blue"    onclick="pickColor(this)" title="Flexoki Blue"></div>
          <div class="swatch sw-flex-purple"    data-color="c-flex-purple"  onclick="pickColor(this)" title="Flexoki Purple"></div>
          <div class="swatch sw-flex-magenta"   data-color="c-flex-magenta" onclick="pickColor(this)" title="Flexoki Magenta"></div>
          <div class="swatch sw-graphite"       data-color="c-graphite" onclick="pickColor(this)" title="Graphite"></div>
          <div class="swatch sw-steel"          data-color="c-steel" onclick="pickColor(this)" title="Steel"></div>
          <div class="swatch sw-ash"            data-color="c-ash" onclick="pickColor(this)" title="Ash"></div>
          <div class="swatch sw-fog"            data-color="c-fog" onclick="pickColor(this)" title="Fog"></div>
          <div class="swatch sw-pearl"          data-color="c-pearl" onclick="pickColor(this)" title="Pearl"></div>
          <div class="swatch sw-smoke"          data-color="c-smoke" onclick="pickColor(this)" title="Smoke"></div>
        </div>
      </div>

      <div class="panel-divider"></div>

      <div class="field-group">
        <label class="field-label">Header</label>
        <div class="color-swatches" id="headerSwatches">
          <div class="swatch sw-navy selected" data-color="c-navy" onclick="pickHeaderColor(this)"></div>
          <div class="swatch sw-moss" data-color="c-moss" onclick="pickHeaderColor(this)"></div>
          <div class="swatch sw-wine" data-color="c-wine" onclick="pickHeaderColor(this)"></div>
          <div class="swatch sw-slate" data-color="c-slate" onclick="pickHeaderColor(this)"></div>
          <div class="swatch sw-umber" data-color="c-umber" onclick="pickHeaderColor(this)"></div>
          <div class="swatch sw-teal" data-color="c-teal" onclick="pickHeaderColor(this)"></div>
          <div class="swatch sw-flex-red" data-color="c-flex-red" onclick="pickHeaderColor(this)" title="Flexoki Red"></div>
          <div class="swatch sw-flex-orange" data-color="c-flex-orange" onclick="pickHeaderColor(this)" title="Flexoki Orange"></div>
          <div class="swatch sw-flex-yellow" data-color="c-flex-yellow" onclick="pickHeaderColor(this)" title="Flexoki Yellow"></div>
          <div class="swatch sw-flex-green" data-color="c-flex-green" onclick="pickHeaderColor(this)" title="Flexoki Green"></div>
          <div class="swatch sw-flex-cyan" data-color="c-flex-cyan" onclick="pickHeaderColor(this)" title="Flexoki Cyan"></div>
          <div class="swatch sw-flex-blue" data-color="c-flex-blue" onclick="pickHeaderColor(this)" title="Flexoki Blue"></div>
          <div class="swatch sw-flex-purple" data-color="c-flex-purple" onclick="pickHeaderColor(this)" title="Flexoki Purple"></div>
          <div class="swatch sw-flex-magenta" data-color="c-flex-magenta" onclick="pickHeaderColor(this)" title="Flexoki Magenta"></div>
          <div class="swatch sw-graphite" data-color="c-graphite" onclick="pickHeaderColor(this)" title="Graphite"></div>
          <div class="swatch sw-steel" data-color="c-steel" onclick="pickHeaderColor(this)" title="Steel"></div>
          <div class="swatch sw-ash" data-color="c-ash" onclick="pickHeaderColor(this)" title="Ash"></div>
          <div class="swatch sw-fog" data-color="c-fog" onclick="pickHeaderColor(this)" title="Fog"></div>
          <div class="swatch sw-pearl" data-color="c-pearl" onclick="pickHeaderColor(this)" title="Pearl"></div>
          <div class="swatch sw-smoke" data-color="c-smoke" onclick="pickHeaderColor(this)" title="Smoke"></div>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Palette</label>
        <div class="custom-select" data-placeholder="Select palette">
          <select class="native-select" id="paletteSelect">
            <option value="" selected disabled>Select palette</option>
            <option value="snu">SNU</option>
            <option value="flexoki">Flexoki</option>
            <option value="warm">Warm</option>
            <option value="cool">Cool</option>
            <option value="earth">Earth</option>
            <option value="dawn">Dawn</option>
            <option value="vivid">Vivid</option>
            <option value="muted">Muted</option>
            <option value="gray">Gray</option>
            <option value="stone">Stone</option>
            <option value="breeze">Breeze</option>
          </select>
          <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
          <div class="custom-select-menu" role="listbox"></div>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Card Info</label>
        <div class="toggle-list" id="cardInfoToggles">
          <label class="toggle">
            <input type="checkbox" id="toggleProf" data-info="prof" checked/>
            <span class="toggle-ui"></span>
            <span class="toggle-label">Professor</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="toggleRoom" data-info="room" checked/>
            <span class="toggle-ui"></span>
            <span class="toggle-label">Room</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="toggleCredit" data-info="credit"/>
            <span class="toggle-ui"></span>
            <span class="toggle-label">Credit</span>
          </label>
        </div>
        <div class="toggle-help" id="toggleHelp">Max 2 Items</div>
      </div>

      <button class="btn-add" onclick="addCourse()">ADD</button>
    </div>
  </aside>
</div>

<a class="fab-github" href="https://github.com/nobel2040ne" target="_blank" rel="noopener" aria-label="GitHub">
  <svg viewBox="0 0 16 16" aria-hidden="true">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
  </svg>
</a>

<div class="fab-duo" role="group" aria-label="Quick actions">
  <button class="fab-save" id="fabSave" type="button" aria-label="시간표 이미지 저장">
    <i class="fa-solid fa-camera-retro" aria-hidden="true"></i>
  </button>
  <span class="fab-divider" aria-hidden="true"></span>
  <button class="fab-add" id="fabAdd" type="button" aria-label="강좌 추가">
    <svg viewBox="0 0 12 12" aria-hidden="true"><line x1="6" y1="2" x2="6" y2="10"/><line x1="2" y1="6" x2="10" y2="6"/></svg>
  </button>
</div>
<div class="panel-backdrop" id="panelBackdrop" aria-hidden="true"></div>

<!-- AUTH MODAL -->
<div class="auth-backdrop" id="authBackdrop" aria-hidden="true">
  <div class="auth-card" role="dialog" aria-modal="true" aria-label="Login">
    <div class="auth-header">Log In</div>
    <div class="auth-body">
      <div class="field-group">
        <label class="field-label">User ID</label>
        <input class="field-input" id="authId" type="text" autocomplete="username"/>
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <input class="field-input" id="authPw" type="password" autocomplete="current-password"/>
      </div>
      <div class="auth-actions">
        <button class="btn-add" id="loginBtn" type="button">LOG IN</button>
        <button class="btn-secondary" id="registerBtn" type="button">REGISTER</button>
      </div>
      <div class="auth-hint">Your ID and password are stored only in this browser.</div>
      <div class="auth-status" id="authStatus"></div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="backdrop" id="backdrop" onclick="handleBdClick(event)">
  <div class="detail-card" id="detailCard">
    <div class="detail-header">
      <span class="detail-title" id="d-title"></span>
      <button class="detail-close" onclick="closeDetail()">
        <svg viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>
      </button>
    </div>
    <div class="detail-rows">
      <div class="detail-row">
        <div class="detail-row-label">Name</div>
        <div class="detail-row-value">
          <input class="detail-input" id="d-name" type="text"/>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">Professor</div>
        <div class="detail-row-value">
          <input class="detail-input" id="d-prof" type="text"/>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">Room</div>
        <div class="detail-row-value">
          <input class="detail-input" id="d-room" type="text"/>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">Times</div>
        <div class="detail-row-value">
          <div class="slot-list detail-slot-list" id="detailSlotList">
            <div class="slot-editor detail-slot-editor">
              <div class="slot-inputs detail-slot-inputs">
                <div class="custom-select" data-placeholder="Select day">
                  <select class="native-select" id="d-day">
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3">Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5">Friday</option>
                  </select>
                  <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                  <div class="custom-select-menu" role="listbox"></div>
                </div>
                <div class="detail-time-inputs">
                  <div class="custom-select" data-placeholder="--:--">
                    <input class="native-time" id="d-start" type="time"/>
                    <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                    <div class="custom-select-menu" role="listbox"></div>
                  </div>
                  <span class="detail-time-sep">–</span>
                  <div class="custom-select" data-placeholder="--:--">
                    <input class="native-time" id="d-end" type="time"/>
                    <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                    <div class="custom-select-menu" role="listbox"></div>
                  </div>
                </div>
              </div>
              <button class="slot-add-btn" id="detailAddSlot" type="button" aria-label="Add time">+</button>
            </div>
            <div class="slot-items" id="detailSlotItems"></div>
          </div>
          <div class="slot-actions detail-slot-actions">
            <button class="btn-ghost" id="detailClearSlots" type="button">CLEAR</button>
          </div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">Credit</div>
        <div class="detail-row-value">
          <input class="detail-input" id="d-credit" type="number" min="1" max="6"/>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-row-label">Color</div>
        <div class="detail-row-value">
          <div class="color-swatches detail-swatches" id="detailSwatches">
            <div class="swatch sw-navy"         data-color="c-navy"        onclick="pickDetailColor(this)"></div>
            <div class="swatch sw-moss"         data-color="c-moss"        onclick="pickDetailColor(this)"></div>
            <div class="swatch sw-wine"         data-color="c-wine"        onclick="pickDetailColor(this)"></div>
            <div class="swatch sw-slate"        data-color="c-slate"       onclick="pickDetailColor(this)"></div>
            <div class="swatch sw-umber"        data-color="c-umber"       onclick="pickDetailColor(this)"></div>
            <div class="swatch sw-teal"         data-color="c-teal"        onclick="pickDetailColor(this)"></div>
            <div class="swatch sw-flex-red"     data-color="c-flex-red"    onclick="pickDetailColor(this)" title="Flexoki Red"></div>
            <div class="swatch sw-flex-orange"  data-color="c-flex-orange" onclick="pickDetailColor(this)" title="Flexoki Orange"></div>
            <div class="swatch sw-flex-yellow"  data-color="c-flex-yellow" onclick="pickDetailColor(this)" title="Flexoki Yellow"></div>
            <div class="swatch sw-flex-green"   data-color="c-flex-green"  onclick="pickDetailColor(this)" title="Flexoki Green"></div>
            <div class="swatch sw-flex-cyan"    data-color="c-flex-cyan"   onclick="pickDetailColor(this)" title="Flexoki Cyan"></div>
            <div class="swatch sw-flex-blue"    data-color="c-flex-blue"   onclick="pickDetailColor(this)" title="Flexoki Blue"></div>
            <div class="swatch sw-flex-purple"  data-color="c-flex-purple" onclick="pickDetailColor(this)" title="Flexoki Purple"></div>
            <div class="swatch sw-flex-magenta" data-color="c-flex-magenta" onclick="pickDetailColor(this)" title="Flexoki Magenta"></div>
            <div class="swatch sw-graphite" data-color="c-graphite" onclick="pickDetailColor(this)" title="Graphite"></div>
            <div class="swatch sw-steel" data-color="c-steel" onclick="pickDetailColor(this)" title="Steel"></div>
            <div class="swatch sw-ash" data-color="c-ash" onclick="pickDetailColor(this)" title="Ash"></div>
            <div class="swatch sw-fog" data-color="c-fog" onclick="pickDetailColor(this)" title="Fog"></div>
            <div class="swatch sw-pearl" data-color="c-pearl" onclick="pickDetailColor(this)" title="Pearl"></div>
            <div class="swatch sw-smoke" data-color="c-smoke" onclick="pickDetailColor(this)" title="Smoke"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-footer">
      <div class="detail-actions">
        <button class="detail-save" id="d-save" type="button">Save</button>
        <button class="detail-delete" id="d-del" onclick="deleteCourse()">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- PROMPT MODAL -->
<div class="prompt-backdrop" id="promptBackdrop" aria-hidden="true">
  <div class="prompt-card" role="dialog" aria-modal="true" aria-label="Prompt">
    <div class="prompt-header" id="promptTitle">Input</div>
    <div class="prompt-body">
      <div class="field-group">
        <label class="field-label" id="promptLabel">Name</label>
        <input class="field-input" id="promptInput" type="text"/>
      </div>
      <div class="prompt-status" id="promptStatus"></div>
      <div class="prompt-actions">
        <button class="btn-secondary" id="promptCancel" type="button">Cancel</button>
        <button class="btn-add" id="promptOk" type="button">OK</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="app.js"></script>
</body>
</html>
